@if (world(); as w) {
  <h2 class="section-title">{{ w.name }}</h2>
}

@if (currentChapter(); as c) {
  <p class="world-age">
    <img class="age-icon" [src]="`assets/img/ages/${c.meta.age.id}.png`" />
    {{ c.meta.age.label }}
  </p>
  <nz-divider />

  @if (c.meta.favorite; as fav) {
    <nz-descriptions nzBordered nzSize="small" [nzColumn]="1">
      <nz-descriptions-item nzTitle="Nom">{{ fav.name }}</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Espèce">{{ fav.asset_id }}</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Descripteur">{{ fav.descriptor }}</nz-descriptions-item>
    </nz-descriptions>
  } @else {
    <p class="empty-state">Aucun favoris pour l'instant.</p>
  }
}
