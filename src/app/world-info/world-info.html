@if (world(); as w) {
  <h2 class="section-title">{{ w.name }}</h2>
}

@if (currentChapter(); as c) {
  <p class="world-age">
    <img class="age-icon" [src]="`assets/img/ages/${c.meta.age.id}.png`" />
    {{ c.meta.age.label }}
  </p>
  <nz-divider />

  @if (c.meta.favorite; as fav) {
    <nz-descriptions nzBordered nzSize="small" [nzColumn]="1">
      <nz-descriptions-item nzTitle="Favoris">
        <img class="species-icon" [src]="`assets/img/species/${fav.asset_id}.png`" />
        {{ fav.name }}
      </nz-descriptions-item>
      <nz-descriptions-item nzTitle="Descripteur">{{ fav.descriptor }}</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Âge">{{ fav.age }} ans</nz-descriptions-item>
    </nz-descriptions>

    <app-rarity-stats title="Nombre de traits" [counts]="fav.traits" [deltas]="deltas()?.traits ?? null" />
    <app-rarity-stats title="Équipement" [counts]="fav.equipment" [deltas]="deltas()?.equipment ?? null" />
  } @else {
    <p class="empty-state">Aucun favoris pour l'instant.</p>
  }
} @else {
  <nz-divider />
  <p class="empty-state">Aucune donnée à afficher.</p>
}
