<h2 class="section-title">Préceptes</h2>
<ul nz-menu nzMode="inline">
  @for (page of pages; track page.slug) {
    <li nz-menu-item nzMatchRouter [routerLink]="['/', page.slug]">{{ page.label }}</li>
  }
</ul>

<h2 class="section-title">Chroniques</h2>
@if (chapters().length) {
  <ul nz-menu nzMode="inline">
    @for (chapter of chapters(); track chapter.slug) {
      <li nz-menu-item nzMatchRouter [routerLink]="['/', chapter.slug]">{{ chapter.label }}</li>
    }
  </ul>
} @else {
  <p class="nav-empty">Aucun chapitre pour l'instant.</p>
}
