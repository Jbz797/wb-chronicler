@if (data(); as d) {
  <div class="stat-row">
    <span>
      @if (d.current !== undefined) {
        <span [class]="d.current | tier: d.max">{{ d.current | number: numberFormat() }}</span> / {{ d.max | number: numberFormat() }}{{ suffix() }}
      } @else {
        <span>{{ d.max | number: numberFormat() }}{{ suffix() }}</span>
      }
      <app-delta [suffix]="deltaSuffix()" [value]="d.valueDelta" />
    </span>
    @if (showRank() && d.rank <= 5) {
      <span>
        <app-delta [inverted]="true" [value]="d.rankDelta" />
        #{{ d.rank }}
      </span>
    }
  </div>
}
